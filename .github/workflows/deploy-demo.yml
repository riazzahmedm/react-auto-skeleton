name: Deploy Demo

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build core
        run: npm run --workspace @auto-skeleton/core build

      - name: Build lit
        run: npm run --workspace @auto-skeleton/lit build

      - name: Build demo
        run: npm run demo:build

      - name: Build docs
        run: npm run build --workspace docs-site

      - name: Merge docs into demo dist
        run: cp -r docs-site/out examples/react-demo/dist/docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: examples/react-demo/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
